<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Frases del Técnico Alfaro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero-card">
      <div class="stars" aria-hidden="true">
        <span>✦</span><span>✚</span><span>✦</span><span>✚</span>
      </div>

      <header class="header">
        <p class="kicker">Generador de</p>
        <h1>Frases</h1>
        <p class="subtitle">del técnico Alfaro</p>
      </header>

      <div class="coach-stage">
        <img src="assets/alfaro-8bit.png" alt="Ilustración 8-bit de un técnico de fútbol en conferencia de prensa" />
      </div>

      <article class="quote-box" aria-live="polite">
        <span class="quote-mark left">“</span>
        <p id="quoteText">El fútbol es como un mate que hay que cebar despacio; si te apurás, lo terminás lavando.</p>
        <span class="quote-mark right">”</span>
      </article>

      <div class="actions">
        <button id="newQuote" class="primary">↻ Nueva frase</button>
        <div class="secondary-actions">
          <button id="copyQuote">📋 Copiar</button>
          <button id="shareQuote">🔗 Compartir</button>
          <button id="speakQuote">🔊 Escuchar</button>
          <button id="favoriteQuote">♡ Favorita</button>
        </div>
      </div>

      <section class="info-card">
        <div>
          <strong>Sabiduría Alfaro</strong>
          <p>Reflexiones, metáforas y enseñanzas de vida al estilo del Maestro.</p>
        </div>
        <span class="trophy" aria-hidden="true">🏆</span>
      </section>

      <section class="favorites-panel" id="favoritesPanel">
        <h2>Favoritas</h2>
        <ul id="favoritesList"></ul>
        <button id="clearFavorites" class="ghost">Borrar favoritas</button>
      </section>

      <footer>
        <button class="tab active" data-tab="quote">⚽ Frase</button>
        <button class="tab" data-tab="favorites">♡ Favoritas</button>
        <button class="tab" data-tab="info">ⓘ Info</button>
        <div class="footer">
          <br>
          <a href="https://instagram.com/roidelatorre" target="_blank">@roidelatorre</a>
          </div>
        </div>
      </footer>
    </section>
  </main>
  <div id="toast" role="status" aria-live="polite"></div>
  <script src="script.js"></script>
</body>

</html>
